---
site_name: pip_ui
site_url: https://pip_ui.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: A pip UI tool
repo_url: https://github.com/matthewdeanmartin/pip_ui
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: README.md
  - Overview: overview/README.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
      - Picking Requirements: usage/requirements.md
      - Global Options: usage/global_options.md
      - Configuration & Editors: usage/configuration.md
      - Presets: usage/presets.md
  - Contributing: extending/CONTRIBUTING.md
  - Code of Conduct: CODE_OF_CONDUCT.md
  - Change Log: CHANGELOG.md
  - Security: SECURITY.md
  - License: LICENSE.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
