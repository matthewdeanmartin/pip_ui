---
ci:
  autoupdate_schedule: quarterly
  autofix_commit_msg: |
    [pre-commit.ci] Apply automatic pre-commit fixes

repos:
  - repo: local
    hooks:
      - id: fix
        name: fix (isort + black + ruff + black)
        language: system
        entry: bash -c 'uv run isort "$@" && uv run black --config pyproject.toml "$@" && uv run ruff check --fix --quiet --config pyproject.toml "$@" && uv run black --config pyproject.toml "$@"' --
        types: [ python ]
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      # check-yaml disabled: uncomment if you have no !reference / !reset tags
      # - id: check-yaml
      - id: check-builtin-literals
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key
      - id: forbid-new-submodules
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations
      - id: python-no-log-warn
      - id: text-unicode-replacement-char
